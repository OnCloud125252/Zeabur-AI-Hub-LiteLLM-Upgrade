version: "3.8"

services:
  litellm:
    image: docker.litellm.ai/berriai/litellm:v1.81.12-stable.1
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "postgresql://llmproxy:dbpassword9090@db:5432/litellm"
      STORE_MODEL_IN_DB: "True"
      LITELLM_MASTER_KEY: "sk-test-key-1234"
      VERTEX_API_KEY: ${VERTEX_API_KEY}
      # DISABLE_SCHEMA_UPDATE: "true"  # Enable if using manual migration
    volumes:
      - ./config/config.yaml:/app/config.yaml
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')" || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
